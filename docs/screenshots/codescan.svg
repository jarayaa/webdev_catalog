<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'Courier New', monospace" role="img">
  <title>WebDev Catalog — análisis estático de código SAST</title>
  <desc>Panel de análisis de código fuente mostrando hallazgos SAST con severidad, CWE, norma chilena y cumplimiento normativo.</desc>

  <!-- Background -->
  <rect width="900" height="580" fill="#0d1117" rx="8"/>

  <!-- Top nav bar -->
  <rect width="900" height="44" fill="#161b22" rx="8"/>
  <rect y="22" width="900" height="22" fill="#161b22"/>
  <rect x="1" y="1" width="898" height="42" fill="none" stroke="#30363d" stroke-width="0.5" rx="7"/>
  <text x="16" y="27" font-size="12" fill="#58a6ff" font-weight="bold">WebDev</text>
  <text x="73" y="27" font-size="12" fill="#e6edf3"> Software Catalog</text>

  <!-- Nav tabs -->
  <rect x="0" y="44" width="900" height="38" fill="#161b22"/>
  <rect x="0" y="82" width="900" height="1" fill="#30363d"/>
  <text x="16" y="68" font-size="11" fill="#8b949e">catálogo</text>
  <text x="90" y="68" font-size="11" fill="#8b949e">auditoría</text>
  <rect x="150" y="52" width="110" height="24" fill="#1f6feb" rx="4"/>
  <text x="205" y="68" font-size="11" fill="#fff" text-anchor="middle">análisis código</text>
  <text x="274" y="68" font-size="11" fill="#8b949e">historial</text>

  <!-- Section header -->
  <rect x="0" y="83" width="900" height="36" fill="#0d1117"/>
  <text x="16" y="108" font-size="13" fill="#e6edf3" font-weight="bold">// análisis de código SAST + cumplimiento normativo</text>

  <!-- Upload area -->
  <rect x="12" y="126" width="876" height="54" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="350" y="148" font-size="10" fill="#8b949e">☁  Sube el código fuente comprimido</text>
  <rect x="440" y="138" width="100" height="22" fill="#1f6feb" rx="4"/>
  <text x="490" y="153" font-size="10" fill="#fff" text-anchor="middle">seleccionar .zip</text>
  <text x="16" y="172" font-size="9" fill="#8b949e">Acepta .zip · .7z · .rar — Defensas zip-slip, zip-bomb, symlink activas — Código nunca ejecutado</text>

  <!-- Analysis in progress / done bar -->
  <rect x="12" y="188" width="876" height="30" fill="#0d1420" rx="4" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="28" y="207" font-size="10" fill="#58a6ff">✓ mi-app-v2.zip  analizando con motor SAST · taint · ML clasificador · Bandit · detect-secrets</text>
  <text x="860" y="207" font-size="9" fill="#8b949e" text-anchor="end">3.2 s</text>

  <!-- Verdict + counts -->
  <rect x="12" y="226" width="400" height="50" fill="#4a1f1f" rx="6" stroke="#f85149" stroke-width="1"/>
  <text x="28" y="246" font-size="14" fill="#f85149" font-weight="bold">✗  NO CONFORME</text>
  <text x="28" y="264" font-size="9" fill="#f85149">1 crítico · 3 altos · 5 medios · 2 bajos</text>

  <rect x="422" y="226" width="120" height="50" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <text x="482" y="242" font-size="9" fill="#8b949e" text-anchor="middle">archivos</text>
  <text x="482" y="258" font-size="18" fill="#e6edf3" text-anchor="middle">47</text>
  <text x="482" y="270" font-size="8" fill="#8b949e" text-anchor="middle">escaneados</text>

  <rect x="552" y="226" width="120" height="50" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <text x="612" y="242" font-size="9" fill="#8b949e" text-anchor="middle">hallazgos</text>
  <text x="612" y="258" font-size="18" fill="#e6edf3" text-anchor="middle">11</text>
  <text x="612" y="270" font-size="8" fill="#8b949e" text-anchor="middle">únicos</text>

  <rect x="682" y="226" width="206" height="50" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <text x="785" y="242" font-size="9" fill="#8b949e" text-anchor="middle">controles evaluados</text>
  <text x="785" y="258" font-size="14" fill="#3fb950" text-anchor="middle">18 / 24</text>
  <text x="785" y="270" font-size="8" fill="#8b949e" text-anchor="middle">conformes (75%)</text>

  <!-- Findings table header -->
  <rect x="12" y="284" width="876" height="24" fill="#161b22" rx="4"/>
  <text x="28" y="299" font-size="9" fill="#8b949e" font-weight="bold">SEVERIDAD</text>
  <text x="110" y="299" font-size="9" fill="#8b949e" font-weight="bold">REGLA / CWE</text>
  <text x="310" y="299" font-size="9" fill="#8b949e" font-weight="bold">ARCHIVO : LÍNEA</text>
  <text x="490" y="299" font-size="9" fill="#8b949e" font-weight="bold">NORMA</text>
  <text x="640" y="299" font-size="9" fill="#8b949e" font-weight="bold">EVIDENCIA</text>
  <rect x="12" y="308" width="876" height="0.5" fill="#30363d"/>

  <!-- Finding 1 — CRÍTICO -->
  <rect x="12" y="309" width="876" height="36" fill="#0d1117"/>
  <rect x="28" y="318" width="56" height="16" fill="#6b1f1f" rx="3"/>
  <text x="56" y="330" font-size="8" fill="#f85149" text-anchor="middle">CRÍTICO</text>
  <text x="110" y="322" font-size="9" fill="#e6edf3">SECRET-HARDCODED</text>
  <text x="110" y="335" font-size="8" fill="#8b949e">CWE-798 · corroborado</text>
  <text x="310" y="328" font-size="9" fill="#58a6ff">config/settings.py:42</text>
  <text x="490" y="328" font-size="8" fill="#8b949e">DS83 Art.29 · Dec.9 Art.6</text>
  <text x="640" y="322" font-size="8" fill="#d29922" font-family="monospace">DB_PASS="prod_***"</text>
  <rect x="12" y="345" width="876" height="0.5" fill="#21262d"/>

  <!-- Finding 2 — ALTO -->
  <rect x="12" y="346" width="876" height="36" fill="#0f1419"/>
  <rect x="28" y="355" width="40" height="16" fill="#3b1f00" rx="3"/>
  <text x="48" y="367" font-size="8" fill="#d29922" text-anchor="middle">ALTO</text>
  <text x="110" y="359" font-size="9" fill="#e6edf3">SQL-CONCAT</text>
  <text x="110" y="372" font-size="8" fill="#8b949e">CWE-89</text>
  <text x="310" y="365" font-size="9" fill="#58a6ff">db/queries.py:118</text>
  <text x="490" y="365" font-size="8" fill="#8b949e">DS83 Art.28 · Dec.7 PROT</text>
  <text x="640" y="359" font-size="8" fill="#d29922" font-family="monospace">"SELECT…"+user_id</text>
  <rect x="12" y="382" width="876" height="0.5" fill="#21262d"/>

  <!-- Finding 3 — ALTO (taint) -->
  <rect x="12" y="383" width="876" height="36" fill="#0d1117"/>
  <rect x="28" y="392" width="40" height="16" fill="#3b1f00" rx="3"/>
  <text x="48" y="404" font-size="8" fill="#d29922" text-anchor="middle">ALTO</text>
  <text x="110" y="396" font-size="9" fill="#e6edf3">TAINT-SQL</text>
  <text x="110" y="409" font-size="8" fill="#58a6ff">flujo de datos ⬈</text>
  <text x="310" y="402" font-size="9" fill="#58a6ff">api/users.py:77→118</text>
  <text x="490" y="402" font-size="8" fill="#8b949e">CWE-89 · Dec.9 Art.6</text>
  <text x="640" y="396" font-size="8" fill="#8b949e">request.args → cursor.execute</text>
  <rect x="12" y="419" width="876" height="0.5" fill="#21262d"/>

  <!-- Finding 4 — MEDIO -->
  <rect x="12" y="420" width="876" height="36" fill="#0f1419"/>
  <rect x="28" y="429" width="50" height="16" fill="#0d2020" rx="3"/>
  <text x="53" y="441" font-size="8" fill="#58a6ff" text-anchor="middle">MEDIO</text>
  <text x="110" y="433" font-size="9" fill="#e6edf3">TLS-DISABLED</text>
  <text x="110" y="446" font-size="8" fill="#8b949e">CWE-295</text>
  <text x="310" y="439" font-size="9" fill="#58a6ff">net/client.py:23</text>
  <text x="490" y="439" font-size="8" fill="#8b949e">Dec.9 Art.6 · DS83 Art.26</text>
  <text x="640" y="433" font-size="8" fill="#d29922" font-family="monospace">verify=False</text>
  <rect x="12" y="456" width="876" height="0.5" fill="#21262d"/>

  <!-- Finding 5 — BAJO -->
  <rect x="12" y="457" width="876" height="36" fill="#0d1117"/>
  <rect x="28" y="466" width="40" height="16" fill="#1a2f1f" rx="3"/>
  <text x="48" y="478" font-size="8" fill="#3fb950" text-anchor="middle">BAJO</text>
  <text x="110" y="470" font-size="9" fill="#e6edf3">DEBUG-MODE</text>
  <text x="110" y="483" font-size="8" fill="#8b949e">CWE-215</text>
  <text x="310" y="476" font-size="9" fill="#58a6ff">app.py:8</text>
  <text x="490" y="476" font-size="8" fill="#8b949e">Dec.11 Art.5</text>
  <text x="640" y="470" font-size="8" fill="#d29922" font-family="monospace">DEBUG=True</text>
  <rect x="12" y="493" width="876" height="0.5" fill="#21262d"/>

  <!-- Export bar -->
  <rect x="12" y="502" width="876" height="34" fill="#161b22" rx="4" stroke="#30363d" stroke-width="0.5"/>
  <text x="28" y="522" font-size="10" fill="#8b949e">Exportar informe:</text>
  <rect x="154" y="509" width="50" height="20" fill="#21262d" rx="3"/>
  <text x="179" y="523" font-size="10" fill="#e6edf3" text-anchor="middle">PDF</text>
  <rect x="214" y="509" width="60" height="20" fill="#21262d" rx="3"/>
  <text x="244" y="523" font-size="10" fill="#e6edf3" text-anchor="middle">DOCX</text>
  <rect x="284" y="509" width="40" height="20" fill="#21262d" rx="3"/>
  <text x="304" y="523" font-size="10" fill="#e6edf3" text-anchor="middle">MD</text>
  <rect x="334" y="509" width="40" height="20" fill="#21262d" rx="3"/>
  <text x="354" y="523" font-size="10" fill="#e6edf3" text-anchor="middle">TXT</text>
  <text x="860" y="522" font-size="9" fill="#8b949e" text-anchor="end">?ext=0 para desactivar motores externos</text>

  <!-- Footer -->
  <rect x="0" y="550" width="900" height="30" fill="#161b22"/>
  <rect x="0" y="550" width="900" height="0.5" fill="#30363d"/>
  <text x="16" y="569" font-size="9" fill="#8b949e">Motor SAST · Taint · ML · Semgrep (opcional) · Bandit · detect-secrets · Dec.7/9/10/11 · DS83/2004</text>
  <text x="840" y="569" font-size="9" fill="#8b949e" text-anchor="end">v2.0 · local</text>
</svg>

  <rect x="120" y="366" width="56" height="16" fill="#3b2f00" rx="8"/>
  <text x="148" y="378" font-size="8" fill="#d29922" text-anchor="middle">MEDIO</text>
  <text x="188" y="376" font-size="9" fill="#8b949e">major atrás · 1 CVE</text>
  <text x="28" y="392" font-size="8" fill="#8b949e">CVE-2023-45857 (CSRF via header injection). Actualizar a axios@1.x con breaking changes menores.</text>
  <text x="28" y="404" font-size="8" fill="#8b949e">Mitigación: migrar a v1.x; revisar instancias que usen withCredentials.</text>

  <!-- Dep item 3 -->
  <rect x="12" y="412" width="876" height="42" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="12" y="412" width="4" height="42" fill="#d29922"/>
  <text x="28" y="428" font-size="10" fill="#e6edf3" font-weight="bold">moment  2.30.1</text>
  <rect x="140" y="418" width="56" height="16" fill="#3b2f00" rx="8"/>
  <text x="168" y="430" font-size="8" fill="#d29922" text-anchor="middle">MEDIO</text>
  <text x="210" y="428" font-size="9" fill="#8b949e">deprecated — sin CVE</text>
  <text x="28" y="444" font-size="8" fill="#8b949e">Librería en modo legacy. Mitigación: migrar a date-fns@3 o Luxon para reducir bundle size y CVE exposure.</text>


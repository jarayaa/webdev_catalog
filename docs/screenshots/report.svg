  <text x="860" y="200" font-size="9" fill="#58a6ff" text-anchor="end">generado con IA</text>

  <rect x="12" y="210" width="876" height="56" fill="#0d1117" rx="3" stroke="#21262d" stroke-width="0.5"/>
  <text x="28" y="226" font-size="9" fill="#e6edf3">El proyecto presenta un nivel de riesgo OBSERVADO. Se detectaron 3 dependencias con CVEs conocidos y</text>
  <text x="28" y="240" font-size="9" fill="#e6edf3">2 librerías con desfase de versión mayor. La dependencia crítica es lodash (CVE-2021-23337, CVSS 7.2).</text>
  <text x="28" y="254" font-size="9" fill="#8b949e">Recomendación prioritaria: actualizar lodash a ≥4.17.21, migrar axios a v1.x y evaluar moment.js →</text>
  <text x="28" y="262" font-size="9" fill="#8b949e">alternativas activas (date-fns, Luxon). El modelo de riesgo es determinista; la redacción usa Claude.</text>

  <!-- Section: Análisis Técnico -->
  <rect x="12" y="274" width="876" height="24" fill="#161b22" rx="3"/>
  <text x="28" y="290" font-size="11" fill="#e6edf3" font-weight="bold">2. Análisis Técnico por Dependencia</text>

  <!-- Dep item 1 -->
  <rect x="12" y="300" width="876" height="60" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <rect x="12" y="300" width="4" height="60" fill="#f85149"/>
  <text x="28" y="316" font-size="10" fill="#e6edf3" font-weight="bold">lodash  4.17.11</text>
  <rect x="140" y="306" width="56" height="16" fill="#4a1f1f" rx="8"/>
  <text x="168" y="318" font-size="8" fill="#f85149" text-anchor="middle">ALTO</text>
  <text x="210" y="316" font-size="9" fill="#8b949e">patch atrás · 2 CVEs</text>
  <text x="28" y="332" font-size="8" fill="#8b949e">CVE-2021-23337 (CVSS 7.2 · Command Injection) · CVE-2020-28500 (CVSS 5.3 · ReDoS)</text>
  <text x="28" y="347" font-size="8" fill="#8b949e">Mitigación: actualizar a lodash@4.17.21 (patch disponible). Sin breaking changes.</text>

  <!-- Dep item 2 -->
  <rect x="12" y="360" width="876" height="52" fill="#0f1419" stroke="#21262d" stroke-width="0.5"/>
  <rect x="12" y="360" width="4" height="52" fill="#d29922"/>
